# cargo-deny configuration
# Run: cargo deny check

[graph]
targets = []

# ── License policy ────────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]
deny = ["GPL-2.0", "GPL-3.0", "AGPL-3.0"]
copyleft = "deny"
allow-osi-fsf-free = "neither"
confidence-threshold = 0.9

# ── Security advisories ───────────────────────────────────────────────────────
[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained  = "warn"
unsound       = "deny"
yanked        = "deny"

# ── Dependency bans ───────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny = [
    # Avoid openssl — prefer rustls
    { name = "openssl" },
    { name = "openssl-sys" },
]

# ── Source policy ─────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
